name: Allure Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run smoke tests and collect Allure results
        run: |
          python -m pytest -m smoke -v --alluredir=allure-results

      # Prevent failure on first run when gh-pages doesn't exist yet
      - name: Check if gh-pages exists
        if: always()
        id: ghpages
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always() && steps.ghpages.outputs.exists == 'true'
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          github_repo: ${{ github.repository }}
          github_repo_owner: ${{ github.repository_owner }}
          github_run_num: ${{ github.run_number }}
          github_run_id: ${{ github.run_id }}
          github_tests_repo: ${{ github.repository }}

      - name: Publish Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
